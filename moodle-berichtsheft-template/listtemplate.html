<tr class="bs_list_row">
    <td class="bs_td_name">
        <div class="bs_user_info">
            <span class="bs_user_avatar">##userpicture##</span>
            <span class="bs_username">##user##</span>
        </div>
    </td>
    <td class="bs_td_zeitraum bs_datum_container">[[Datum1]]</td>
    <td class="bs_td_beruf">[[Praktikumsberuf]]</td>
    <td class="bs_td_betrieb">[[Praktikumsbetrieb]]</td>
    <td class="bs_td_highlight">
        <span class="bs_trophy_icon" title="Highlight der Woche: [[Highlight]]">
            <i class="fas fa-trophy"></i>
        </span>
    </td>
    <td class="bs_td_actions">
        <div class="bs_action_buttons">
            <span class="bs_action_link">##more##</span>
            <span class="bs_action_link">##edit##</span>
        </div>
    </td>
</tr>
